<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial;
        color: white;
    }

    .container {
        width: 90%;
        max-width: 600px;
        text-align: center;
    }

    video {
        width: 100%;
        border-radius: 12px;
        display: none; /* hidden until play button is clicked */
    }

    button {
        margin-top: 20px;
        padding: 14px 30px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        background: #00e1ff;
        color: black;
    }

    button:hover {
        background: #00b3cc;
    }
</style>

</head>
<body>

<div class="container">
    <h2>My Video Page</h2>

    <!-- Video -->
    <video id="myVideo" controls>
        <source src="video/video1.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <!-- Button -->
    <button onclick="playVideo()">▶ Play Video</button>
</div>

<script>
function playVideo() {
    let v = document.getElementById("myVideo");
    v.style.display = "block"; // show video
    v.play();                  // play video
}
</script>

</body>
</html>
